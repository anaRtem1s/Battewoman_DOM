 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battewoman_DOM</title>
    <link rel="stylesheet" href="styles/style.css"
</head>

<body>
    <div class="container-page">
        <h1>Battewoman's little fun game</h1>
        <p>Find my 5 Greek God'esse's names ::</p>
        
        <input type="text" class="input"
        placeholder="Try a letter:">
        <input type="submit" class="submit"
        value="Go">
        <div class="display"> 
            <div >You have <span class="total-lives"></span> lives in total, lucky boy.</div>
            <div>Remaining lives: <span class="count-display">  </span> </div>
            <div>Letters you've already tried: <span  class="tried-letters"></span></div>
        </div>
    </div>
    
    
    
    <script src="script/script.js" defer></script>  
</body>
</html>
